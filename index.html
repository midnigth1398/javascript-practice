<!DOCTYPE html>
<html>
<head>
    <title>Defense Clicker PRO</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(#0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        .container {
            max-width: 450px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .bar-inner {
            height: 100%;
            transition: width 0.3s;
        }

        #enemyBar { background: red; }
        #playerBar { background: cyan; }

        button {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .attack { background: #ff5722; }
        .upgrade { background: #4caf50; }
        .skill { background: #2196f3; }

        img {
            width: 100px;
        }

        .damage {
            position: absolute;
            color: yellow;
            font-weight: bold;
            animation: float 1s ease-out;
        }

        @keyframes float {
            0% {opacity: 1; transform: translateY(0);}
            100% {opacity: 0; transform: translateY(-40px);}
        }
    </style>
</head>

<body>

<div class="container">

    <h1>⚔️ Defense Clicker PRO</h1>

    <div class="card">
        <p id="enemyText"></p>
        <div class="bar"><div id="enemyBar" class="bar-inner"></div></div>
        <img id="enemyImg" src="./enemy.png">
    </div>

    <div class="card">
        <p>❤️ Tu vida</p>
        <div class="bar"><div id="playerBar" class="bar-inner"></div></div>
        <img src="./player.png">
    </div>

    <div class="card">
        <p id="money"></p>
        <p id="level"></p>
        <p id="damage"></p>

        <button class="attack" onclick="attack()">⚔️ Atacar</button>
        <button class="upgrade" onclick="upgrade()">⬆️ Mejorar</button>
        <button class="skill" onclick="special()">⚡ Habilidad</button>
    </div>

    <div class="card">
        <h3>🛒 Tienda</h3>
        <button onclick="buyPotion()">💊 Curar (20)</button>
        <button onclick="buyPower()">💥 +Daño (30)</button>
    </div>

</div>

<script src="game.js"></script>

</body>
</html>
