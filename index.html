<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Defense Clicker Ultimate</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f2027;
    color: white;
    text-align: center;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 10px;
}

.card {
    background: rgba(0,0,0,0.6);
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.bar {
    width: 100%;
    height: 18px;
    background: #333;
    border-radius: 10px;
}

.bar-inner {
    height: 100%;
    transition: width 0.2s;
}

#enemyBar { background: red; }
#playerBar { background: cyan; }

img {
    width: 100px;
    transition: transform 0.1s;
}

button {
    width: 30%;
    padding: 12px;
    margin: 5px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
}

.attack { background: #ff5722; }
.skill { background: #2196f3; }
.pause { background: gray; }

.menu {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.damage {
    position: absolute;
    font-weight: bold;
    animation: float 1s ease-out;
}

@keyframes float {
    0% {opacity:1; transform: translateY(0);}
    100% {opacity:0; transform: translateY(-40px);}
}
</style>
</head>

<body>

<div class="container">

<h2>⚔️ Defense Clicker</h2>

<div class="card">
    <p id="enemyText"></p>
    <div class="bar"><div id="enemyBar" class="bar-inner"></div></div>
    <img id="enemyImg" src="./enemy.png">
</div>

<div class="card">
    <div class="bar"><div id="playerBar" class="bar-inner"></div></div>
    <img src="./player.png">
</div>

<div class="card">
    <p id="money"></p>
    <p id="level"></p>

    <button class="attack" onclick="attack()">⚔️</button>
    <button class="skill" onclick="skill()">💥</button>
    <button class="skill" onclick="heal()">❤️</button>
</div>

<button class="pause" onclick="togglePause()">⏸️ Pausa</button>

</div>

<!-- MENU PAUSA -->
<div id="pauseMenu" class="menu">
    <h1>⏸️ Pausado</h1>
    <button onclick="togglePause()">▶️ Continuar</button>
    <button onclick="resetGame()">🔄 Reiniciar</button>
</div>

<script src="game.js"></script>

</body>
</html>
